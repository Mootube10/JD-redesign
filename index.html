<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JD Sports Redesign</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    header {
      background: #000;
      color: #fff;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      margin: 0;
    }

    .search-box input {
      padding: 8px;
      border-radius: 6px;
      border: none;
    }

    .hero {
      background: url('https://via.placeholder.com/1200x400') center/cover;
      color: white;
      padding: 80px 30px;
      text-align: center;
    }

    .hero h2 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .hero button {
      padding: 10px 20px;
      background: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 30px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .card button {
      margin-top: 10px;
      padding: 8px 15px;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
      border-radius: 6px;
    }

    .cart {
      position: fixed;
      top: 20px;
      right: 20px;
      background: black;
      color: white;
      padding: 10px 15px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<header>
  <h1>JD Redesign</h1>
  <div class="search-box">
    <input type="text" id="search" placeholder="Search trainers..." onkeyup="filterProducts()">
  </div>
</header>

<div class="cart" id="cart">Cart: 0</div>

<section class="hero">
  <h2>Level Up Your Style</h2>
  <p>Discover the latest trainers & streetwear</p>
  <button>Shop Now</button>
</section>

<section class="products" id="products"></section>

<script>
  const products = [
    { name: "Nike Air Max", price: 120, image: "https://via.placeholder.com/250" },
    { name: "Adidas Ultraboost", price: 140, image: "https://via.placeholder.com/250" },
    { name: "Puma RS-X", price: 100, image: "https://via.placeholder.com/250" }
  ];

  let cartCount = 0;

  function displayProducts(list) {
    const container = document.getElementById("products");
    container.innerHTML = "";

    list.forEach(product => {
      container.innerHTML += `
        <div class="card">
          <img src="${product.image}" />
          <h3>${product.name}</h3>
          <p>£${product.price}</p>
          <button onclick="addToCart()">Add to Cart</button>
        </div>
      `;
    });
  }

  function addToCart() {
    cartCount++;
    document.getElementById("cart").innerText = "Cart: " + cartCount;
  }

  function filterProducts() {
    const search = document.getElementById("search").value.toLowerCase();
    const filtered = products.filter(p => p.name.toLowerCase().includes(search));
    displayProducts(filtered);
  }

  displayProducts(products);
</script>

</body>
</html>
