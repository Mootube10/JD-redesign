<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JD High-End Concept</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,sans-serif;background:#0b0b0b;color:#fff}

    header{display:flex;justify-content:space-between;align-items:center;padding:16px 40px;background:#000;position:sticky;top:0;z-index:10}
    .logo{font-weight:700;font-size:22px}
    .nav{display:flex;gap:20px}
    .nav a{color:#aaa;text-decoration:none}
    .nav a:hover{color:#fff}

    .right{display:flex;gap:10px;align-items:center}
    input{padding:8px 12px;border-radius:20px;border:none}
    .cart-btn{background:#fff;color:#000;padding:6px 12px;border-radius:20px;cursor:pointer}

    .hero{height:70vh;background:url('https://images.unsplash.com/photo-1542291026-7eec264c27ff') center/cover;display:flex;align-items:center;justify-content:center;position:relative}
    .hero::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,.6)}
    .hero-content{position:relative;text-align:center}
    .hero h1{font-size:52px;margin:0}
    .hero button{margin-top:15px;padding:12px 25px;border:none;border-radius:30px;font-weight:600;cursor:pointer}

    .container{display:grid;grid-template-columns:240px 1fr;gap:20px;padding:30px}
    .sidebar{background:#141414;padding:20px;border-radius:12px}
    .sidebar button{width:100%;margin:6px 0;padding:8px;background:#222;border:none;color:#fff;border-radius:8px;cursor:pointer}

    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px}
    .card{background:#141414;border-radius:16px;overflow:hidden;cursor:pointer;transition:.2s}
    .card:hover{transform:translateY(-6px)}
    .card img{width:100%;height:200px;object-fit:cover}
    .card-content{padding:15px}
    .price{color:#aaa}

    /* Modal */
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center}
    .modal-box{background:#111;padding:20px;border-radius:12px;width:90%;max-width:500px}

    /* Cart Drawer */
    .cart{position:fixed;top:0;right:-320px;width:300px;height:100%;background:#111;padding:20px;transition:.3s}
    .cart.open{right:0}
  </style>
</head>
<body>

<header>
  <div class="logo">JD Concept</div>
  <div class="nav">
    <a href="#">Men</a><a href="#">Women</a><a href="#">Kids</a><a href="#">Sale</a>
  </div>
  <div class="right">
    <input id="search" placeholder="Search..." onkeyup="filter()" />
    <div class="cart-btn" onclick="toggleCart()">Cart (<span id="count">0</span>)</div>
  </div>
</header>

<section class="hero">
  <div class="hero-content">
    <h1>Next Level Streetwear</h1>
    <button>Shop Now</button>
  </div>
</section>

<div class="container">
  <div class="sidebar">
    <h3>Brands</h3>
    <button onclick="setBrand('all')">All</button>
    <button onclick="setBrand('Nike')">Nike</button>
    <button onclick="setBrand('Adidas')">Adidas</button>
  </div>
  <div class="grid" id="grid"></div>
</div>

<div class="modal" id="modal">
  <div class="modal-box" id="modalBox"></div>
</div>

<div class="cart" id="cartBox">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>
</div>

<script>
const data=[
{name:'Nike Air Max',price:120,brand:'Nike',img:'https://images.unsplash.com/photo-1542291026-7eec264c27ff'},
{name:'Adidas Ultraboost',price:140,brand:'Adidas',img:'https://images.unsplash.com/photo-1600185365926-3a2ce3cdb9eb'}
];
let cart=[];let brand='all';

function render(list){
const g=document.getElementById('grid');g.innerHTML='';
list.forEach(p=>{
 g.innerHTML+=`<div class='card' onclick='openProduct(${JSON.stringify(p)})'>
 <img src='${p.img}'><div class='card-content'><h3>${p.name}</h3><div class='price'>£${p.price}</div></div></div>`
});}

function filter(){
let s=document.getElementById('search').value.toLowerCase();
let f=data.filter(p=>p.name.toLowerCase().includes(s));
if(brand!=='all')f=f.filter(p=>p.brand===brand);
render(f);
}

function setBrand(b){brand=b;filter();}

function openProduct(p){
document.getElementById('modal').style.display='flex';
document.getElementById('modalBox').innerHTML=`
<h2>${p.name}</h2>
<img src='${p.img}' style='width:100%;border-radius:10px'>
<p>£${p.price}</p>
<button onclick='add(${JSON.stringify(p)})'>Add to Cart</button>
`;
}

document.getElementById('modal').onclick=e=>{if(e.target.id==='modal')e.target.style.display='none'};

function add(p){cart.push(p);updateCart();}

function updateCart(){
document.getElementById('count').innerText=cart.length;
let c=document.getElementById('cartItems');c.innerHTML='';
cart.forEach(i=>c.innerHTML+=`<p>${i.name} - £${i.price}</p>`);
}

function toggleCart(){document.getElementById('cartBox').classList.toggle('open');}

render(data);
</script>

</body>
</html>
